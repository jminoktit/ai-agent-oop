<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Agent OOP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; padding: 2rem; width: 360px; }
        .card h1 { color: #38bdf8; margin-bottom: 1.5rem; text-align: center; }
        .card form { display: flex; flex-direction: column; gap: 1rem; }
        .card input { padding: .7rem; border: 1px solid #334155; border-radius: .5rem; background: #0f172a; color: #e2e8f0; font-size: 1rem; }
        .card input:focus { outline: none; border-color: #38bdf8; }
        .card button { padding: .7rem; background: #0284c7; color: white; border: none; border-radius: .5rem; cursor: pointer; font-size: 1rem; }
        .card button:hover { background: #0369a1; }
        .card .error { color: #ef4444; font-size: .85rem; }
        .card .error li { list-style: none; }
        .card p { text-align: center; margin-top: 1rem; color: #94a3b8; }
        .card a { color: #38bdf8; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password1" placeholder="Password" required>
            <input type="password" name="password2" placeholder="Confirm password" required>
            <button type="submit">Register</button>
            {% if form.errors %}
            <div class="error">
                {% for field, errors in form.errors.items %}
                    {% for error in errors %}<li>{{ error }}</li>{% endfor %}
                {% endfor %}
            </div>
            {% endif %}
        </form>
        <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
    </div>
</body>
</html>
